services:
  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
    environment:
      - APP_ENV=development

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - api
